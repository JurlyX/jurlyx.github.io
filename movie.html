<iframe id="ifr"></iframe>
<style>
  iframe {
    border: none; 
    margin: 0;
    display: none;
  }
</style>
<input id="IMDB" placeholder="Put Your IMDB ID here."> </input>
<button onclick="StartVid()"> Start Video </button>
<script>
  const imdb = document.getElementById("IMDB");
  const frame = document.getElementById("ifr");
  const url = "https://vidsrc.net/embed/movie?imdb=" + imdb.value;
  function StartVid() { 
    frame.src = url;
    frame.style.display = block;
  }
</script>
